<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Adiwrites</title>
  <meta name="description" content="Essays on history, philosophy, religion, personas, and books. Written for curious minds." />
  <link rel="icon" type="image/png" sizes="32x32" href="/adiwrites-favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/adiwrites-favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #13161e;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --text: #ffffff; --muted: rgba(232,226,217,0.42); --muted2: rgba(232,226,217,0.18);
      --accent: #C8F06E;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
      --font-sans: 'DM Sans', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-weight: 300; line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.5; }

    /* NAVBAR */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 68px; border-bottom: 1px solid var(--border); background: rgba(13,15,20,0.6); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); }
    .nav-logo { font-family: var(--font-sans); font-weight: 550; font-size: 26px; letter-spacing: -0.05em; color: var(--text); line-height: 1; }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); transition: color 0.2s; position: relative; }
    .nav-links a::after { content: ''; position: absolute; bottom: -3px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.25s ease; }
    .nav-links a:hover { color: var(--text); } .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: var(--accent); } .nav-links a.active::after { width: 100%; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .nav-hamburger span { display: block; width: 22px; height: 1px; background: var(--muted); transition: all 0.3s; }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); background: var(--text); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); background: var(--text); }
    .nav-mobile { display: none; position: fixed; top: 68px; left: 0; right: 0; background: rgba(13,15,20,0.97); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 32px 48px; z-index: 99; flex-direction: column; gap: 28px; }
    .nav-mobile.open { display: flex; }
    .nav-mobile a { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); transition: color 0.2s; }
    .nav-mobile a:hover, .nav-mobile a.active { color: var(--accent); }

    /* PAGE */
    .page { position: relative; z-index: 1; padding-top: 68px; }
    .page-inner { padding: 80px 48px 96px; }

    /* HEADER */
    .blog-header { margin-bottom: 64px; padding-bottom: 32px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .blog-eyebrow { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .blog-eyebrow::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--accent); }
    .blog-title { font-family: var(--font-sans); font-size: 48px; font-weight: 300; letter-spacing: -0.02em; line-height: 1; color: var(--text); }
    .blog-title em { font-family: var(--font-serif); font-style: italic; color: var(--accent); }
    .blog-count { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); text-align: right; }
    .blog-count strong { display: block; font-family: var(--font-serif); font-size: 36px; font-weight: 300; color: var(--text); letter-spacing: 0; line-height: 1; margin-bottom: 4px; }

    /* FILTERS */
    .blog-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 48px; }
    .blog-filter-btn { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 8px 16px; cursor: pointer; transition: all 0.2s; }
    .blog-filter-btn:hover, .blog-filter-btn.active { color: var(--accent); border-color: var(--accent); }

    /* GRID */
    .blog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-bottom: 64px; }

    .blog-card { background: var(--surface); border: 1px solid var(--border); padding: 40px 36px; display: flex; flex-direction: column; justify-content: space-between; min-height: 260px; transition: border-color 0.3s; position: relative; overflow: hidden; opacity: 0; transform: translateY(16px); animation: blogFadeIn 0.5s ease forwards; }
    .blog-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, var(--accent), transparent); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; }
    .blog-card:hover { border-color: var(--border2); } .blog-card:hover::before { transform: scaleX(1); }
    .blog-card.featured { grid-column: span 2; min-height: 200px; background: rgba(200,240,110,0.02); border-color: rgba(200,240,110,0.12); }
    .blog-card.featured:hover { border-color: rgba(200,240,110,0.28); }
    .blog-card.featured .blog-card-title { font-size: 30px; }
    .blog-card:nth-child(1) { animation-delay: 0.05s; } .blog-card:nth-child(2) { animation-delay: 0.10s; }
    .blog-card:nth-child(3) { animation-delay: 0.15s; } .blog-card:nth-child(4) { animation-delay: 0.20s; }
    .blog-card:nth-child(5) { animation-delay: 0.25s; } .blog-card:nth-child(6) { animation-delay: 0.30s; }
    .blog-card:nth-child(7) { animation-delay: 0.35s; } .blog-card:nth-child(8) { animation-delay: 0.40s; }
    @keyframes blogFadeIn { to { opacity: 1; transform: translateY(0); } }

    .blog-card-num { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.2em; color: var(--muted2); margin-bottom: 16px; display: block; }
    .blog-card-tag { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: block; }
    .blog-card-title { font-family: var(--font-serif); font-size: 22px; font-weight: 300; line-height: 1.35; color: var(--text); margin-bottom: 14px; transition: color 0.2s; }
    .blog-card:hover .blog-card-title { color: rgba(255,255,255,0.85); }
    .blog-card-excerpt { font-family: var(--font-sans); font-size: 13px; font-weight: 300; color: var(--muted); line-height: 1.7; margin-bottom: 28px; flex: 1; }
    .blog-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .blog-card-meta { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted2); }
    .blog-card-read { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); border: 1px solid var(--border); padding: 7px 14px; transition: all 0.2s; }
    .blog-card:hover .blog-card-read { color: var(--accent); border-color: rgba(200,240,110,0.4); }

    /* EMPTY STATE */
    .blog-empty { grid-column: span 2; text-align: center; padding: 80px 0; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted2); }

    /* PAGINATION */
    .blog-pagination { display: flex; align-items: center; justify-content: space-between; padding-top: 32px; border-top: 1px solid var(--border); }
    .blog-page-info { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
    .blog-page-info strong { color: var(--text); font-weight: 400; }
    .blog-page-btns { display: flex; gap: 4px; }
    .blog-page-btn { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 16px; cursor: pointer; transition: all 0.2s; }
    .blog-page-btn:hover, .blog-page-btn.active { color: var(--accent); border-color: var(--accent); }
    .blog-page-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .blog-page-btn.active { background: rgba(200,240,110,0.06); }

    /* FOOTER */
    .footer { position: relative; z-index: 1; padding: 32px 48px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .footer-logo { font-family: var(--font-sans); font-weight: 500; font-size: 18px; letter-spacing: -0.05em; color: var(--text); }
    .footer-copy { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted2); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .nav { padding: 0 24px; } .nav-links { display: none; } .nav-hamburger { display: flex; }
      .nav-mobile { padding: 32px 24px; }
      .page-inner { padding: 60px 24px 80px; }
      .footer { padding: 24px; flex-direction: column; align-items: flex-start; gap: 12px; }
    }
    @media (max-width: 680px) {
      .blog-grid { grid-template-columns: 1fr; }
      .blog-card.featured { grid-column: span 1; }
      .blog-card.featured .blog-card-title { font-size: 22px; }
      .blog-title { font-size: 34px; }
      .blog-header { flex-direction: column; align-items: flex-start; }
      .blog-count { text-align: left; }
      .blog-pagination { flex-direction: column; gap: 20px; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">adiwrites</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
      <li><a href="quotes.html">Quotes</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="nav-mobile" id="nav-mobile">
    <a href="index.html">Home</a>
    <a href="blog.html" class="active">Blog</a>
    <a href="quotes.html">Quotes</a>
    <a href="contact.html">Contact</a>
  </div>

  <div class="page">
    <div class="page-inner">

      <div class="blog-header">
        <div>
          <p class="blog-eyebrow">The Archive</p>
          <h1 class="blog-title">All <em>essays</em></h1>
        </div>
        <div class="blog-count">
          <strong id="blog-total">—</strong>
          Posts &amp; growing
        </div>
      </div>

      <div class="blog-filters">
        <button class="blog-filter-btn active" data-cat="all"         onclick="blogFilter('all', this)">All</button>
        <button class="blog-filter-btn"         data-cat="history"    onclick="blogFilter('history', this)">History</button>
        <button class="blog-filter-btn"         data-cat="philosophy" onclick="blogFilter('philosophy', this)">Philosophy</button>
        <button class="blog-filter-btn"         data-cat="religion"   onclick="blogFilter('religion', this)">Religion</button>
        <button class="blog-filter-btn"         data-cat="personas"   onclick="blogFilter('personas', this)">Personas</button>
        <button class="blog-filter-btn"         data-cat="books"      onclick="blogFilter('books', this)">Books</button>
      </div>

      <div id="posts-container" class="blog-grid"></div>

      <div class="blog-pagination">
        <div class="blog-page-info">
          Page <strong id="blog-page-cur">1</strong> of <strong id="blog-page-total">1</strong>
        </div>
        <div class="blog-page-btns" id="blog-page-btns"></div>
      </div>

    </div>

    <footer class="footer">
      <span class="footer-logo">adiwrites</span>
      <span class="footer-copy">© Adiwrites 2026 — All rights reserved</span>
    </footer>
  </div>

  <script>
    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const navMobile = document.getElementById('nav-mobile');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navMobile.classList.toggle('open');
    });
    navMobile.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      hamburger.classList.remove('open');
      navMobile.classList.remove('open');
    }));

    const PER_PAGE = 8;
    let allPosts = [];
    let currentPage = 1;
    let currentFilter = 'all';

    const CAT_LABELS = {
      history: 'History', philosophy: 'Philosophy',
      religion: 'Religion', personas: 'Personas', books: 'Books'
    };

    // Load posts.json, then apply any ?category= param from the URL
    fetch('data/posts.json')
      .then(r => r.json())
      .then(data => {
        allPosts = data.sort((a, b) => new Date(b.date) - new Date(a.date));

        // ── URL param filtering (from index.html category cards) ──
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('category'); // e.g. "history"
        if (cat) {
          const btn = document.querySelector(`.blog-filter-btn[data-cat="${cat}"]`);
          if (btn) {
            blogFilter(cat, btn); // sets filter + renders
            return;              // skip the default blogRender() below
          }
        }

        blogRender(); // default: show all
      });

    function blogFilter(cat, btn) {
      currentFilter = cat;
      currentPage = 1;
      document.querySelectorAll('.blog-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      blogRender();
    }

    function getFiltered() {
      if (currentFilter === 'all') return allPosts;
      return allPosts.filter(p => {
        if (Array.isArray(p.category)) return p.category.includes(currentFilter);
        return p.category === currentFilter;
      });
    }

    function blogRender() {
      const filtered = getFiltered();
      const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
      const start = (currentPage - 1) * PER_PAGE;
      const pageItems = filtered.slice(start, start + PER_PAGE);

      document.getElementById('blog-total').textContent = allPosts.length;
      document.getElementById('blog-page-cur').textContent = currentPage;
      document.getElementById('blog-page-total').textContent = totalPages;

      const grid = document.getElementById('posts-container');
      grid.innerHTML = '';

      if (pageItems.length === 0) {
        grid.innerHTML = '<div class="blog-empty">No essays in this category yet.</div>';
        renderPagination(totalPages);
        return;
      }

      pageItems.forEach((p, i) => {
        const globalIndex = start + i + 1;
        const isFeatured = i === 0 && currentPage === 1 && currentFilter === 'all';
        const card = document.createElement('a');
        card.href = p.slug;
        card.className = 'blog-card' + (isFeatured ? ' featured' : '');
        card.innerHTML =
          '<div>' +
            '<span class="blog-card-num">№ ' + String(globalIndex).padStart(2, '0') + '</span>' +
            '<span class="blog-card-tag">' + (CAT_LABELS[p.category] || p.category) + '</span>' +
            '<h2 class="blog-card-title">' + p.title + '</h2>' +
            '<p class="blog-card-excerpt">' + p.excerpt + '</p>' +
          '</div>' +
          '<div class="blog-card-footer">' +
            '<span class="blog-card-meta">' + p.date + ' &nbsp;·&nbsp; ' + p.read + '</span>' +
            '<span class="blog-card-read">Read →</span>' +
          '</div>';
        grid.appendChild(card);
      });

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const btns = document.getElementById('blog-page-btns');
      btns.innerHTML = '';

      const prev = document.createElement('button');
      prev.className = 'blog-page-btn';
      prev.textContent = '← Prev';
      prev.disabled = currentPage === 1;
      prev.onclick = () => { if (currentPage > 1) { currentPage--; blogRender(); scrollTop(); } };
      btns.appendChild(prev);

      for (let p = 1; p <= totalPages; p++) {
        const btn = document.createElement('button');
        btn.className = 'blog-page-btn' + (p === currentPage ? ' active' : '');
        btn.textContent = p;
        btn.onclick = ((pg) => () => { currentPage = pg; blogRender(); scrollTop(); })(p);
        btns.appendChild(btn);
      }

      const next = document.createElement('button');
      next.className = 'blog-page-btn';
      next.textContent = 'Next →';
      next.disabled = currentPage === totalPages;
      next.onclick = () => { if (currentPage < totalPages) { currentPage++; blogRender(); scrollTop(); } };
      btns.appendChild(next);
    }

    function scrollTop() {
      document.querySelector('.page-inner').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@0.2.28/bundled/lenis.js"></script>
  <script>
    const lenis = new Lenis({
      duration: 1.2,
      easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      direction: 'vertical',
      gestureDirection: 'vertical',
      smooth: true,
      mouseMultiplier: 1,
      smoothTouch: false,
      touchMultiplier: 2,
      infinite: false,
    });

    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);
  </script>

  <style>
    html { scroll-behavior: auto !important; }
  </style>

</body>
</html>
